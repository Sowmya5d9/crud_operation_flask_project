<!DOCTYPE html>
<html>
<head>
    <title>Flask ML CRUD App (No DB)</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
        }

        h2 {
            text-align: center;
            padding: 20px;
            margin: 0;
            background: #007bff;
            color: white;
        }

        .container {
            padding: 20px;
        }

        .form-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        input {
            padding: 10px;
            width: 200px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.85;
        }

        .add-btn {
            background: #28a745;
            color: white;
        }

        .update-btn {
            background: #007bff;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        th {
            background: #007bff;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .edit-btn {
            background: orange;
            color: white;
        }

        .delete-btn {
            background: red;
            color: white;
        }
    </style>
</head>

<body>

<h2>Student Details</h2>

<div class="container">

    <!-- FORM -->
    <div class="form-box">
        <input type="hidden" id="itemId">

        <input type="text" id="name" placeholder="Enter Name">
        <input type="number" id="value" placeholder="Enter Value">

        <button class="add-btn" onclick="addItem()">Add</button>
        <button class="update-btn" onclick="updateItem()">Update</button>
    </div>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Roll no</th>
                <th>Prediction</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableData"></tbody>
    </table>

</div>

<script src="/static/script.js"></script>

</body>
</html>
